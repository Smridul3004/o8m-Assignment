version: '3.8'

services:
  # ============ Infrastructure ============

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-o8m_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      POSTGRES_DB: ${POSTGRES_DB:-o8m_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-o8m_user}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # ============ Microservices ============

  api-gateway:
    build: ./backend/api-gateway
    ports:
      - "${API_GATEWAY_PORT:-3000}:3000"
    env_file: .env
    depends_on:
      auth-service:
        condition: service_started
      user-service:
        condition: service_started
      discovery-service:
        condition: service_started
      chat-service:
        condition: service_started
      call-service:
        condition: service_started
      billing-service:
        condition: service_started
      notification-service:
        condition: service_started

  auth-service:
    build: ./backend/auth-service
    ports:
      - "${AUTH_SERVICE_PORT:-3001}:3001"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started

  user-service:
    build: ./backend/user-service
    ports:
      - "${USER_SERVICE_PORT:-3002}:3002"
    env_file: .env
    depends_on:
      mongo:
        condition: service_healthy
      kafka:
        condition: service_started

  discovery-service:
    build: ./backend/discovery-service
    ports:
      - "${DISCOVERY_SERVICE_PORT:-3003}:3003"
    env_file: .env
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started

  chat-service:
    build: ./backend/chat-service
    ports:
      - "${CHAT_SERVICE_PORT:-3004}:3004"
    env_file: .env
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started

  call-service:
    build: ./backend/call-service
    ports:
      - "${CALL_SERVICE_PORT:-3005}:3005"
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      AGORA_APP_ID: "8140f62fea4f4f2b9bebaecd2b07ebb4"
      AGORA_APP_CERTIFICATE: "7e70d82434d146f58227dc5e3f473238"
      # No AGORA_APP_CERTIFICATE needed for testing


  billing-service:
    build: ./backend/billing-service
    ports:
      - "${BILLING_SERVICE_PORT:-3006}:3006"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started

  notification-service:
    build: ./backend/notification-service
    ports:
      - "${NOTIFICATION_SERVICE_PORT:-3007}:3007"
    env_file: .env
    depends_on:
      mongo:
        condition: service_healthy
      kafka:
        condition: service_started

volumes:
  postgres_data:
  mongo_data:
  redis_data:
